<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="KAIZEN — Operational Intelligence Platform" />
    <title>KAIZEN</title>

    <!--
      Theme boot: runs before React mounts to prevent flash of wrong theme.
      Reads localStorage, falls back to system preference.
    -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('kaizen-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (saved === 'dark' || (!saved && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
